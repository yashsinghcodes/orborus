name: Docker Release & Latest

on:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - "**"
      - "!.github/**"
      - "!**.md"
      - "!docker-compose.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - release
          - both

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: "amd64,arm64,arm"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PUSH_PAT }}

      - name: Determine build type and version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            BUILD_TYPE="release"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="latest"
            BUILD_TYPE="latest"
          else
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
            VERSION="latest"
          fi

          echo "build_type=${BUILD_TYPE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Strip 'v' prefix if present
          STRIPPED_VERSION=$(echo "${VERSION}" | sed 's/^v//')
          echo "stripped_version=${STRIPPED_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Stripped: ${STRIPPED_VERSION}, Type: ${BUILD_TYPE}"

      - name: Build and push (latest)
        if: steps.version.outputs.build_type == 'latest' || steps.version.outputs.build_type == 'both'
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/shuffle/shuffle-orborus:latest
            ghcr.io/shuffle-orborus/shuffle-orborus:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shuffle-orborus:latest
            shuffle-orborus/shuffle-orborus:latest
            frikky/shuffle-orborus:latest
            frikky/shuffle:orborus

      - name: Build and push (release with aliases)
        if: steps.version.outputs.build_type == 'release' || steps.version.outputs.build_type == 'both'
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/shuffle/shuffle-orborus:${{ steps.version.outputs.version }}
            ghcr.io/shuffle/shuffle-orborus:${{ steps.version.outputs.stripped_version }}
            ghcr.io/shuffle-orborus/shuffle-orborus:${{ steps.version.outputs.version }}
            ghcr.io/shuffle-orborus/shuffle-orborus:${{ steps.version.outputs.stripped_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shuffle-orborus:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shuffle-orborus:${{ steps.version.outputs.stripped_version }}
            shuffle-orborus/shuffle-orborus:${{ steps.version.outputs.version }}
            shuffle-orborus/shuffle-orborus:${{ steps.version.outputs.stripped_version }}
            frikky/shuffle-orborus:${{ steps.version.outputs.version }}
            frikky/shuffle-orborus:${{ steps.version.outputs.stripped_version }}

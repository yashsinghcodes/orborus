name: Release Go Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.3.6)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        run: |
          mkdir -p dist

          GOOS=${{ matrix.os }}
          GOARCH=${{ matrix.arch }}

          EXT=""
          LDFLAGS=""

          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
            LDFLAGS="-H=windowsgui"
          fi

          BINARY_NAME="orborus-agent-${GOOS}-${GOARCH}"
          OUTPUT="dist/${BINARY_NAME}${EXT}"

          echo "Building $OUTPUT"
          GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="$LDFLAGS" -o "$OUTPUT"

      - name: Package
        run: |
          cd dist

          VERSION="${{ github.event.inputs.version }}"

          for file in *; do
            if [[ "$file" == *.exe ]]; then
              zip "${file%.exe}.zip" "$file"
            else
              tar -czf "${file}.tar.gz" "$file"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*


  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (for tag creation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          VERSION="${{ github.event.inputs.version }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          find dist -mindepth 2 -type f -exec mv -t dist {} + || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}
